name: ci-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Set up golang
        uses: actions/setup-go@v2
        with:
          go-version: ^1.26.3
        id: go

      - name: Check out code
        uses: actions/checkout@v2

      - name: Test
        run: make test

      
        
