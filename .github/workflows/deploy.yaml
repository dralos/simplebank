name: Deploy to production

on:
  push:
    branches: [ master ]

# Required for OIDC authentication to request JWT tokens from GitHub
permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Set up Docker Buildx (Provides faster builds and better caching)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 2. Modern AWS Auth via OIDC (No long-lived Secret Keys!)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::395840094367:role/github-actions-ecr-role 
        aws-region: eu-south-1

    # 3. Log into Amazon ECR (Upgraded to v2)
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Modern Build and Push using the specialized Docker action
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        # Dynamically pulls the registry address output from the ECR login step
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/simplebank:${{ github.sha }}
          ${{ steps.login-ecr.outputs.registry }}/simplebank:latest
        # Native GitHub actions caching speeds up consecutive builds drastically
        cache-from: type=gha
        cache-to: type=gha,mode=max