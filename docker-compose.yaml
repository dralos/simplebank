services:
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=simple_bank
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d simple_bank"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_SOURCE=postgresql://app_user:secret@postgres:5432/simple_bank?sslmode=disable
    depends_on:
        postgres:
          condition: service_healthy  # Wait for health check to pass
    entrypoint: [ "/app/start.sh" ]
    command: ["/app/main"]